<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Contact — Covert Coffee | 1643 Broadway, Bushwick Brooklyn</title>
  <meta name="description" content="Contact Covert Coffee at 1643 Broadway, Bushwick Brooklyn. Phone: (718) 484-1555. Hours: Mon-Sat 8am-5pm, Sun 9am-5pm. Directions and Instagram.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.covert.nyc/contact.html">
  <meta property="og:title" content="Contact — Covert Coffee">
  <meta property="og:description" content="Visit Covert Coffee at 1643 Broadway, Bushwick Brooklyn. Phone, hours, directions.">
  <meta property="og:url" content="https://www.covert.nyc/contact.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23594A3C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M17 8h1a4 4 0 0 1 0 8h-1'/><path d='M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z'/><line x1='6' y1='2' x2='6' y2='4'/><line x1='10' y1='2' x2='10' y2='4'/><line x1='14' y1='2' x2='14' y2='4'/></svg>">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+French+Canon:ital@0;1&family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:    #F2E4BB;
      --tan:      #D9C2A7;
      --blush:    #F2E2CE;
      --linen:    #F2ECE4;
      --espresso: #594A3C;
      --ink:      #2a211a;
      --mono:     "JetBrains Mono", "Courier New", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      background: var(--linen);
      color: var(--ink);
      font-family: "IM Fell French Canon", serif;
      font-size: 17px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.046;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── NAV ── */
    nav {
      position: relative;
      top: 0; left: 0; right: 0;
      z-index: 800;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 56px;
      background: var(--linen);
      border-bottom: 1px solid rgba(89,74,60,0.1);
      gap: 16px;
    }
    .nav-logo img { height: 22px; width: auto; display: block; opacity: 0.82; flex-shrink: 0; }
    .nav-right { display: flex; align-items: center; gap: 14px; }

    .hamburger {
      background: none;
      border: 1px solid rgba(92,74,56,0.18);
      border-radius: 2px;
      padding: 7px 9px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s;
    }
    .hamburger:hover { border-color: rgba(92,74,56,0.4); }
    .hamburger span {
      display: block; width: 16px; height: 1.5px;
      background: var(--espresso); opacity: 0.5; border-radius: 1px;
    }

    .nav-drawer {
      display: none;
      position: fixed; inset: 0;
      z-index: 9500;
      background: rgba(43,31,21,0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .nav-drawer.open { display: flex; animation: fadeIn 0.2s ease both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .nav-drawer-inner {
      margin-left: auto;
      width: 280px; max-width: 85vw; height: 100%;
      background: var(--linen);
      padding: 28px 24px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 0;
      animation: slideIn 0.25s ease both;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .drawer-close {
      align-self: flex-end;
      background: none;
      border: 1px solid rgba(92,74,56,0.18);
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--espresso);
      opacity: 0.5;
      cursor: pointer;
      padding: 6px 10px;
      margin-bottom: 28px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .drawer-close:hover { opacity: 0.9; }
    .drawer-section-label {
      font-family: var(--mono);
      font-size: 0.48rem;
      letter-spacing: 0.14em;
      color: var(--espresso);
      opacity: 0.28;
      text-transform: uppercase;
      margin: 20px 0 10px;
    }
    .drawer-section-label:first-of-type { margin-top: 0; }
    .drawer-link {
      display: block;
      font-family: "IM Fell French Canon", serif;
      font-size: 1.1rem;
      color: var(--espresso);
      text-decoration: none;
      padding: 10px 0;
      border-bottom: 1px solid rgba(92,74,56,0.07);
      transition: opacity 0.15s;
      opacity: 0.78;
    }
    .drawer-link:hover { opacity: 1; }
    .drawer-link:last-child { border-bottom: none; }

    .drawer-dropdown { border-bottom: 1px solid rgba(92,74,56,0.07); }
    .drawer-dropdown-toggle {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; background: none; border: none;
      font-family: "IM Fell French Canon", serif; font-size: 1.1rem;
      color: var(--espresso); text-align: left; padding: 10px 0;
      cursor: pointer; opacity: 0.78; transition: opacity 0.15s;
    }
    .drawer-dropdown-toggle:hover { opacity: 1; }
    .drawer-dropdown-toggle .dd-arrow { font-size: 0.7rem; opacity: 0.4; transition: transform 0.25s ease; }
    .drawer-dropdown.open .dd-arrow { transform: rotate(90deg); }
    .drawer-dropdown-content {
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease; padding: 0 0 0 4px;
    }
    .drawer-dropdown.open .drawer-dropdown-content { max-height: 120px; padding: 0 0 12px 4px; }
    .drawer-dropdown-content .dd-line {
      font-family: "Averia Serif Libre", serif; font-weight: 300;
      font-size: 0.88rem; color: var(--espresso); opacity: 0.55; line-height: 1.6;
    }
    .drawer-dropdown-content .dd-line a {
      color: var(--espresso); text-decoration: none; border-bottom: 1px dotted rgba(92,74,56,0.25);
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 60px 28px 40px;
      max-width: 680px;
      margin: 0 auto;
    }
    .mono-label {
      font-family: var(--mono);
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: var(--espresso);
      opacity: 0.38;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mono-label::before { content: '//'; opacity: 0.5; }
    .page-header h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-style: italic;
      font-weight: 400;
      color: var(--espresso);
      line-height: 1.12;
    }

    /* ── CONTACT CONTENT ── */
    .content {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    .contact-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(92,74,56,0.07);
      align-items: baseline;
    }
    .contact-row:last-child { border-bottom: none; }

    .contact-key {
      font-family: var(--mono);
      font-size: 0.56rem;
      letter-spacing: 0.07em;
      color: var(--espresso);
      opacity: 0.44;
      padding-top: 1px;
    }
    .contact-val {
      font-family: "Averia Serif Libre", serif;
      font-weight: 300;
      font-size: 0.94rem;
      color: var(--espresso);
      line-height: 1.6;
    }
    .contact-val a {
      color: var(--espresso);
      text-decoration: none;
      border-bottom: 1px solid rgba(92,74,56,0.18);
      transition: opacity 0.15s;
    }
    .contact-val a:hover { opacity: 0.7; }

    .address-big {
      font-family: "IM Fell French Canon", serif;
      font-size: 1.3rem;
      font-style: italic;
      color: var(--espresso);
      line-height: 1.3;
    }
    .address-note {
      font-family: var(--mono);
      font-size: 0.56rem;
      letter-spacing: 0.05em;
      color: var(--espresso);
      opacity: 0.4;
      margin-top: 4px;
    }

    .map-links {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }
    .map-link {
      font-family: var(--mono);
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--espresso);
      text-decoration: none;
      border: 1px solid rgba(92,74,56,0.2);
      background: rgba(92,74,56,0.03);
      padding: 10px 14px;
      border-radius: 2px;
      transition: background 0.15s, border-color 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .map-link:hover { background: rgba(92,74,56,0.08); border-color: rgba(92,74,56,0.38); }

    .hours-table {
      font-family: "Averia Serif Libre", serif;
      font-weight: 300;
      font-size: 0.82rem;
      color: var(--espresso);
      border-collapse: collapse;
    }
    .hours-table td {
      padding: 4px 0;
    }
    .hours-table td:first-child {
      padding-right: 24px;
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      .page-header { padding: 40px 20px 28px; }
      .content { padding: 0 20px 60px; }
      .contact-row { grid-template-columns: 1fr; gap: 4px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html"><img src="logo.png" alt="Covert"></a>
    <div class="nav-right">
      <button class="hamburger" onclick="document.getElementById('nav-drawer').classList.add('open')" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="nav-drawer" id="nav-drawer" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="nav-drawer-inner">
      <button class="drawer-close" onclick="document.getElementById('nav-drawer').classList.remove('open')">✕ close</button>

      <div class="drawer-section-label">navigate</div>
      <div id="drawer-nav-links"></div>
    </div>
  </div>

  <div class="page-header">
    <p class="mono-label">bushwick · brooklyn · 11207</p>
    <h1>Contact</h1>
  </div>

  <div class="content">

    <div class="contact-row">
      <span class="contact-key">location</span>
      <div class="contact-val">
        <div class="address-big">1643 Broadway</div>
        <div class="address-note">Brooklyn, NY 11207</div>
        <div class="map-links">
          <a class="map-link" href="https://maps.apple/p/2WMFaQ0~o0tfPP" target="_blank" rel="noopener">apple maps</a>
          <a class="map-link" href="https://maps.app.goo.gl/FcmQHCoEsRMNnDzM9" target="_blank" rel="noopener">google maps</a>
        </div>
      </div>
    </div>

    <div class="contact-row">
      <span class="contact-key">phone</span>
      <div class="contact-val">
        <a href="tel:+17184841555">(718) 484-1555</a>
      </div>
    </div>

    <div class="contact-row">
      <span class="contact-key">instagram</span>
      <div class="contact-val">
        <a href="https://www.instagram.com/covertcoffeebk/" target="_blank" rel="noopener">@covertcoffeebk</a>
      </div>
    </div>

    <div class="contact-row">
      <span class="contact-key">hours</span>
      <div class="contact-val">
        <table class="hours-table">
          <tr><td>Mon – Fri</td><td>8:00 am – 5:00 pm</td></tr>
          <tr><td>Saturday</td><td>8:00 am – 5:00 pm</td></tr>
          <tr><td>Sunday</td><td>9:00 am – 5:00 pm</td></tr>
        </table>
      </div>
    </div>

    <div class="contact-row">
      <span class="contact-key">wholesale</span>
      <div class="contact-val">
        <a href="https://www.covert.coffee" target="_blank" rel="noopener">covert.coffee</a>
      </div>
    </div>

  </div>

  <script>
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') document.getElementById('nav-drawer').classList.remove('open');
  });

  fetch('nav.json').then(function(r) { return r.json(); }).then(function(links) {
    var c = document.getElementById('drawer-nav-links');
    if (!c) return;
    links.forEach(function(link) {
      if (link.label === 'Wholesale') {
        var wrap = document.createElement('div');
        wrap.className = 'drawer-dropdown';
        wrap.innerHTML = '<button class="drawer-dropdown-toggle">Wholesale <span class="dd-arrow">\u203a</span></button><div class="drawer-dropdown-content"><div class="dd-line" style="font-style:italic;">Coming soon!</div><div class="dd-line"><a href="tel:+17184841555">(718) 484-1555</a></div></div>';
        wrap.querySelector('.drawer-dropdown-toggle').onclick = function() { wrap.classList.toggle('open'); };
        c.appendChild(wrap);
      } else {
        var a = document.createElement('a');
        a.className = 'drawer-link';
        a.href = link.href;
        a.textContent = link.label;
        if (link.external) { a.target = '_blank'; a.rel = 'noopener'; }
        c.appendChild(a);
      }
    });
  }).catch(function(e) { console.warn('nav.json:', e); });
  </script>

</body>
</html>
