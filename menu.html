<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Menu — Covert Coffee | Bushwick Brooklyn Coffee Shop</title>
  <meta name="description" content="Menu at Covert Coffee, 1643 Broadway, Bushwick Brooklyn. Sandwiches, bagels, breakfast tacos, and specialty coffee. Prices and descriptions.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.covert.nyc/menu.html">
  <meta property="og:title" content="Menu — Covert Coffee">
  <meta property="og:description" content="Sandwiches, bagels, breakfast tacos, and specialty coffee at Covert Coffee in Bushwick, Brooklyn.">
  <meta property="og:url" content="https://www.covert.nyc/menu.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23594A3C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M17 8h1a4 4 0 0 1 0 8h-1'/><path d='M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z'/><line x1='6' y1='2' x2='6' y2='4'/><line x1='10' y1='2' x2='10' y2='4'/><line x1='14' y1='2' x2='14' y2='4'/></svg>">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Menu",
    "name": "Covert Coffee Menu",
    "url": "https://www.covert.nyc/menu.html",
    "mainEntityOfPage": "https://www.covert.nyc/menu.html",
    "hasMenuSection": [
      {
        "@type": "MenuSection",
        "name": "Sandwiches",
        "hasMenuItem": [
          {"@type": "MenuItem", "name": "PEC", "offers": {"@type": "Offer", "price": "8", "priceCurrency": "USD"}},
          {"@type": "MenuItem", "name": "Avocado", "offers": {"@type": "Offer", "price": "14", "priceCurrency": "USD"}},
          {"@type": "MenuItem", "name": "Hummus", "offers": {"@type": "Offer", "price": "14", "priceCurrency": "USD"}},
          {"@type": "MenuItem", "name": "Prosciutto", "offers": {"@type": "Offer", "price": "15", "priceCurrency": "USD"}}
        ]
      },
      {
        "@type": "MenuSection",
        "name": "Breakfast",
        "hasMenuItem": [
          {"@type": "MenuItem", "name": "Breakfast Taco", "offers": {"@type": "Offer", "price": "5", "priceCurrency": "USD"}}
        ]
      },
      {
        "@type": "MenuSection",
        "name": "Bagels",
        "hasMenuItem": [
          {"@type": "MenuItem", "name": "Cream Cheese Bagel", "offers": {"@type": "Offer", "price": "5", "priceCurrency": "USD"}},
          {"@type": "MenuItem", "name": "Lox Bagel", "offers": {"@type": "Offer", "price": "12", "priceCurrency": "USD"}}
        ]
      }
    ]
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+French+Canon:ital@0;1&family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:    #F2E4BB;
      --tan:      #D9C2A7;
      --blush:    #F2E2CE;
      --linen:    #F2ECE4;
      --espresso: #594A3C;
      --ink:      #2a211a;
      --mono:     "JetBrains Mono", "Courier New", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      background: var(--linen);
      color: var(--ink);
      font-family: "IM Fell French Canon", serif;
      font-size: 17px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.046;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── NAV ── */
    nav {
      position: relative;
      top: 0; left: 0; right: 0;
      z-index: 800;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 56px;
      background: var(--linen);
      border-bottom: 1px solid rgba(89,74,60,0.1);
      gap: 16px;
    }
    .nav-logo img { height: 22px; width: auto; display: block; opacity: 0.82; flex-shrink: 0; }
    .nav-right { display: flex; align-items: center; gap: 14px; }

    /* hamburger */
    .hamburger {
      background: none;
      border: 1px solid rgba(92,74,56,0.18);
      border-radius: 2px;
      padding: 7px 9px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s;
    }
    .hamburger:hover { border-color: rgba(92,74,56,0.4); }
    .hamburger span {
      display: block; width: 16px; height: 1.5px;
      background: var(--espresso); opacity: 0.5; border-radius: 1px;
    }

    /* drawer */
    .nav-drawer {
      display: none;
      position: fixed; inset: 0;
      z-index: 9500;
      background: rgba(43,31,21,0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .nav-drawer.open { display: flex; animation: fadeIn 0.2s ease both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .nav-drawer-inner {
      margin-left: auto;
      width: 280px; max-width: 85vw; height: 100%;
      background: var(--linen);
      padding: 28px 24px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 0;
      animation: slideIn 0.25s ease both;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .drawer-close {
      align-self: flex-end;
      background: none;
      border: 1px solid rgba(92,74,56,0.18);
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--espresso);
      opacity: 0.5;
      cursor: pointer;
      padding: 6px 10px;
      margin-bottom: 28px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .drawer-close:hover { opacity: 0.9; }
    .drawer-section-label {
      font-family: var(--mono);
      font-size: 0.48rem;
      letter-spacing: 0.14em;
      color: var(--espresso);
      opacity: 0.28;
      text-transform: uppercase;
      margin: 20px 0 10px;
    }
    .drawer-section-label:first-of-type { margin-top: 0; }
    .drawer-link {
      display: block;
      font-family: "IM Fell French Canon", serif;
      font-size: 1.1rem;
      color: var(--espresso);
      text-decoration: none;
      padding: 10px 0;
      border-bottom: 1px solid rgba(92,74,56,0.07);
      transition: opacity 0.15s;
      opacity: 0.78;
    }
    .drawer-link:hover { opacity: 1; }
    .drawer-link:last-child { border-bottom: none; }

    .drawer-dropdown { border-bottom: 1px solid rgba(92,74,56,0.07); }
    .drawer-dropdown-toggle {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; background: none; border: none;
      font-family: "IM Fell French Canon", serif; font-size: 1.1rem;
      color: var(--espresso); text-align: left; padding: 10px 0;
      cursor: pointer; opacity: 0.78; transition: opacity 0.15s;
    }
    .drawer-dropdown-toggle:hover { opacity: 1; }
    .drawer-dropdown-toggle .dd-arrow { font-size: 0.7rem; opacity: 0.4; transition: transform 0.25s ease; }
    .drawer-dropdown.open .dd-arrow { transform: rotate(90deg); }
    .drawer-dropdown-content {
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease; padding: 0 0 0 4px;
    }
    .drawer-dropdown.open .drawer-dropdown-content { max-height: 120px; padding: 0 0 12px 4px; }
    .drawer-dropdown-content .dd-line {
      font-family: "Averia Serif Libre", serif; font-weight: 300;
      font-size: 0.88rem; color: var(--espresso); opacity: 0.55; line-height: 1.6;
    }
    .drawer-dropdown-content .dd-line a {
      color: var(--espresso); text-decoration: none; border-bottom: 1px dotted rgba(92,74,56,0.25);
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 60px 28px 40px;
      max-width: 680px;
      margin: 0 auto;
    }
    .mono-label {
      font-family: var(--mono);
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: var(--espresso);
      opacity: 0.38;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mono-label::before { content: '//'; opacity: 0.5; }
    .page-header h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-style: italic;
      font-weight: 400;
      color: var(--espresso);
      line-height: 1.12;
    }

    /* ── MENU CONTENT ── */
    .content {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    .menu-section { margin-top: 10px; }
    .menu-section + .menu-section { margin-top: 28px; }
    .menu-category {
      font-family: var(--mono);
      font-size: 0.54rem;
      letter-spacing: 0.1em;
      color: var(--espresso);
      opacity: 0.48;
      margin-bottom: 8px;
    }
    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      padding: 5px 0;
    }
    .menu-name {
      font-family: "Averia Serif Libre", serif;
      font-weight: 300;
      font-size: 0.94rem;
      color: var(--espresso);
      opacity: 0.92;
      line-height: 1.4;
      flex: 1;
    }
    .menu-price {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--espresso);
      opacity: 0.5;
      flex-shrink: 0;
    }
    .menu-desc {
      font-family: "Averia Serif Libre", serif;
      font-weight: 300;
      font-size: 0.82rem;
      color: var(--espresso);
      opacity: 0.55;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .menu-bagel-types {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0 12px;
    }
    .bagel-type {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.04em;
      color: var(--espresso);
      border: 1px solid rgba(92,74,56,0.22);
      padding: 5px 10px;
      border-radius: 2px;
      opacity: 0.7;
    }
    .bagel-type.seasonal {
      border-color: rgba(168,120,50,0.4);
      background: rgba(168,120,50,0.06);
    }
    .seasonal-tag {
      font-size: 0.42rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-left: 4px;
    }

    @media (max-width: 600px) {
      .page-header { padding: 40px 20px 28px; }
      .content { padding: 0 20px 60px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html"><img src="logo.png" alt="Covert"></a>
    <div class="nav-right">
      <button class="hamburger" onclick="document.getElementById('nav-drawer').classList.add('open')" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="nav-drawer" id="nav-drawer" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="nav-drawer-inner">
      <button class="drawer-close" onclick="document.getElementById('nav-drawer').classList.remove('open')">✕ close</button>

      <div class="drawer-section-label">navigate</div>
      <div id="drawer-nav-links"></div>
    </div>
  </div>

  <div class="page-header">
    <p class="mono-label">1643 broadway · brooklyn</p>
    <h1>Menu</h1>
  </div>

  <div class="content" id="menu-content"></div>

  <script>
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') document.getElementById('nav-drawer').classList.remove('open');
  });

  fetch('menu.json').then(function(r) { return r.json(); }).then(function(sections) {
    var c = document.getElementById('menu-content');
    if (!c) return;
    c.innerHTML = sections.map(function(s) {
      var html = '<div class="menu-section"><div class="menu-category">' + s.category + '</div>';
      if (s.types) {
        html += '<div class="menu-bagel-types">';
        s.types.forEach(function(t) { html += '<span class="bagel-type">' + t + '</span>'; });
        if (s.seasonal) s.seasonal.forEach(function(t) { html += '<span class="bagel-type seasonal">' + t + ' <span class="seasonal-tag">seasonal</span></span>'; });
        html += '</div>';
      }
      s.items.forEach(function(item) {
        html += '<div class="menu-item"><span class="menu-name">' + item.name + '</span><span class="menu-price">' + item.price + '</span></div>';
        if (item.desc) html += '<div class="menu-desc">' + item.desc + '</div>';
      });
      html += '</div>';
      return html;
    }).join('');
  }).catch(function(e) { console.warn('menu.json:', e); });

  fetch('nav.json').then(function(r) { return r.json(); }).then(function(links) {
    var c = document.getElementById('drawer-nav-links');
    if (!c) return;
    links.forEach(function(link) {
      if (link.label === 'Wholesale') {
        var wrap = document.createElement('div');
        wrap.className = 'drawer-dropdown';
        wrap.innerHTML = '<button class="drawer-dropdown-toggle">Wholesale <span class="dd-arrow">\u203a</span></button><div class="drawer-dropdown-content"><div class="dd-line" style="font-style:italic;">Coming soon!</div><div class="dd-line"><a href="tel:+17184841555">(718) 484-1555</a></div></div>';
        wrap.querySelector('.drawer-dropdown-toggle').onclick = function() { wrap.classList.toggle('open'); };
        c.appendChild(wrap);
      } else {
        var a = document.createElement('a');
        a.className = 'drawer-link';
        a.href = link.href;
        a.textContent = link.label;
        if (link.external) { a.target = '_blank'; a.rel = 'noopener'; }
        c.appendChild(a);
      }
    });
  }).catch(function(e) { console.warn('nav.json:', e); });
  </script>

</body>
</html>
